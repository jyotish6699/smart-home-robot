<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Aegis</title>

    <link
        rel="stylesheet"
        href="/style.css">

</head>

<body>

<div class="container">

<h1>Aegis</h1>

<p class="status">

Connected

</p>

<div class="controls">

<button id="forward">

▲

</button>

<div class="middle">

<button id="left">

◀

</button>

<button id="stop">

■

</button>

<button id="right">

▶

</button>

</div>

<button id="backward">

▼

</button>

</div>

<div class="card">

    <h2>Speed Control</h2>

    <div class="speed-value">

        <span id="speedText">255</span>

    </div>

    <input
        type="range"
        id="speedSlider"
        min="0"
        max="255"
        value="255"
    >

</div>

<div class="speed-presets">

    <button id="precision">
        🐢 Precision
    </button>

    <button id="normal">
        🚗 Normal
    </button>

    <button id="sport">
        🚀 Sport
    </button>

</div>

</div>

<script src="/app.js"></script>

</body>

</html>
