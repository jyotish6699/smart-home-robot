<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Aegis Remote Control</title>

    <link
        rel="stylesheet"
        href="/style.css">

</head>

<body>

<div class="container">

    <h1>Aegis</h1>

    <p
        id="connectionStatus"
        class="status">

        🟢 Connected

    </p>

    <!-- Driving Mode -->

    <div class="card">

        <h2>Driving Mode</h2>

        <div class="mode-selector">

            <button
                id="buttonMode"
                class="mode active">

                Buttons

            </button>

            <button
                id="joystickMode"
                class="mode">

                Joystick

            </button>

        </div>

    </div>

    <!-- Button Controls -->

    <div id="buttonControls">

        <div class="controls">

            <button id="forward">

                ▲

            </button>

            <div class="middle">

                <button id="left">

                    ◀

                </button>

                <button id="stop">

                    ■

                </button>

                <button id="right">

                    ▶

                </button>

            </div>

            <button id="backward">

                ▼

            </button>

        </div>

    </div>

    <!-- Joystick -->

    <div
        id="joystickControls"
        class="card hidden">

        <h2>Virtual Joystick</h2>

        <div id="joystickBase">

            <div id="joystickStick"></div>

        </div>

    </div>

    <!-- Speed -->

    <div class="card">

        <h2>Speed Control</h2>

        <div class="speed-value">

            <span id="speedText">

                255

            </span>

        </div>

        <input

            id="speedSlider"

            type="range"

            min="0"

            max="255"

            value="255">

    </div>

    <!-- Motion Profiles -->

    <div class="speed-presets">

        <button id="precision">

            🐢 Precision

        </button>

        <button id="normal">

            🚗 Normal

        </button>

        <button id="sport"
                class="active">

            🚀 Sport

        </button>

    </div>

    <!-- Emergency Stop -->

    <div class="card">

        <button

            id="emergencyStop"

            class="emergency">

            🛑 EMERGENCY STOP

        </button>

    </div>

</div>

<script

    type="module"

    src="/app.js">

</script>

</body>

</html>
